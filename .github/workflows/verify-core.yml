name: Verify Core

on:
  pull_request:
    paths:
      - "src/**"
      - "public/**"
      - "tools/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "eslint.config.js"
      - "tailwind.config.js"
      - "postcss.config.js"
      - "index.html"
      - ".github/workflows/verify-core.yml"
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "tools/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "eslint.config.js"
      - "tailwind.config.js"
      - "postcss.config.js"
      - "index.html"
      - ".github/workflows/verify-core.yml"

jobs:
  verify-core:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify core
        run: npm run verify:core
