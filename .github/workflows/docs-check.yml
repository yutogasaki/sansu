name: Docs Check

on:
  pull_request:
    paths:
      - "CONSTITUTION.md"
      - "docs/**"
      - "tools/check-docs.mjs"
      - "package.json"
      - ".github/workflows/docs-check.yml"
  push:
    branches:
      - main
    paths:
      - "CONSTITUTION.md"
      - "docs/**"
      - "tools/check-docs.mjs"
      - "package.json"
      - ".github/workflows/docs-check.yml"

jobs:
  docs-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run docs check
        run: npm run docs:check
